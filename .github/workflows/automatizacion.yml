name: Ejecucion Diaria del Modelo Estadistico

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  calcular-predicciones:
    runs-on: ubuntu-latest
    
    # 1. Otorgar permisos para que el servidor pueda guardar el archivo Excel en tu repositorio
    permissions:
      contents: write

    steps:
    - name: Clonar el repositorio actual
      uses: actions/checkout@v3

    - name: Configurar Entorno de Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar Libreria de Peticiones Web
      run: pip install requests

    - name: Ejecutar Motor Estadistico de Poisson
      env:
        API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      run: python mi_modelo.py

    # 2. Comando automático para tomar el archivo .csv generado y subirlo a tu cuenta de GitHub
    - name: Guardar y Subir Cambios al Repositorio
      run: |
        git config --global user.name "Bot_Poisson_Apuestas"
        git config --global user.email "actions@github.com"
        git add predicciones_historico.csv
        git commit -m "Actualización automática de predicciones diarias [skip ci]" || echo "No hay partidos nuevos hoy"
        git push
