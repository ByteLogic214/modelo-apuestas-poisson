name: Daily Tipster Model

on:
  schedule:
    # Ejecución diaria a las 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run_model_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Poisson model
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python mi_modelo.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predicciones_historico.csv
          git commit -m "Actualización diaria de predicciones [skip ci]" || echo "No hay cambios"
          git push
