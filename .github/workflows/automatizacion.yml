name: Daily Poisson Prediction

on:
  schedule:
    # Se ejecuta todos los días a las 08:00 UTC (ajusta según tu huso horario)
    - cron: '0 8 * * *'
  workflow_dispatch:   # Permite ejecutar manualmente desde la interfaz de GitHub

jobs:
  model_and_push:
    runs-on: ubuntu-latest
    # Permisos necesarios para escribir en el repositorio
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Poisson model
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python mi_modelo.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predicciones_historico.csv
          # [skip ci] evita que este commit vuelva a lanzar el workflow
          git commit -m "Actualización diaria de predicciones [skip ci]" || echo "No hay cambios para commitear"
          git push
